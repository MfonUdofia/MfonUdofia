{% assign contact = site.data.sitetext[site.locale].contact | default: site.data.sitetext.contact %}

<section class="page-section" id="{{ contact.section | default: 'contact' }}">
  <div class="container">
    <div class="row">
      <div class="col-lg-12 text-center">
        <h2 class="section-heading text-uppercase">{{ contact.title | markdownify | default: 'Contact' }}</h2>
        <h3 class="section-subheading text-muted">{{ contact.text | default: '' }}</h3>
      </div>
    </div>
    <div class="row">
      <div class="col-lg-12">
        <form id="contactForm" action="https://formspree.io/{% if site.formspree_form_path %}{{ site.formspree_form_path }}{% else %}{{ site.email }}{% endif %}" novalidate="novalidate" method="POST">
          <div class="row">
            <div class="col-md-6">
              <div class="form-group">
                <input name="name" class="form-control" id="name" type="text" placeholder="{{ contact.name | default: 'Name*' }}" required="required" data-validation-required-message="{{ contact.name-validation | default: 'Please enter your name.' }}">
                <p class="help-block text-danger"></p>
              </div>
              <div class="form-group d-none">
                <input name="username" class="form-control" id="username" type="text" tabindex="-1" autocomplete="off">
              </div>
              <div class="form-group">
                <input name="_replyto" class="form-control" id="email" type="email" placeholder="{{ contact.email | default: 'Email*' }}" required="required" data-validation-required-message="{{ contact.email-validation | default: 'Please enter your email address.' }}">
                <p class="help-block text-danger"></p>
              </div>
              <div class="form-group">
                <input name="phone" class="form-control" id="phone" type="tel" placeholder="{{ contact.phone | default: 'Phone Number' }}" data-validation-required-message="{{ contact.phone-validation | default: 'Please enter your phone number.' }}">
                <p class="help-block text-danger"></p>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-group">
                <textarea name="message" class="form-control" id="message" placeholder="Message" required="required" data-validation-required-message="{{ contact.message-validation | default: 'Please enter a message.' }}"></textarea>
                <p class="help-block text-danger"></p>
              </div>
            </div>
            <input type="hidden" name="_subject" id="email-subject" value="{{ contact.subject | default: 'Contact Form Submission' }}">
            <div class="clearfix"></div>
            <div class="col-lg-12 text-center">
              <div id="success"></div>
              <button id="sendMessageButton" class="btn btn-primary btn-xl text-uppercase" type="submit">{{ contact.submit | default: 'Send Message' }}</button>
            </div>
            <input type="text" name="_gotcha" style="display:none">
            <input type="hidden" name="_next" value="#" />
          </div>
        </form>
      </div>
    </div>
  </div>
</section>
